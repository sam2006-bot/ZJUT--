services:
  - type: web
    name: claude-student-code-grader
    runtime: python
    plan: free
    region: singapore
    buildCommand: "true"
    startCommand: python3 app.py
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_API_PATH
        sync: false
      - key: INVITE_CODES
        sync: false
      - key: INVITE_SESSION_SECRET
        sync: false
