services:
  - type: web
    name: claude-student-code-grader
    runtime: python
    plan: free
    region: singapore
    buildCommand: "true"
    startCommand: python3 app.py
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
